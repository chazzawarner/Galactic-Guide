# docker-compose.yml — base stack (production Dockerfile targets).
# Loaded by: docker compose up (dev, via docker-compose.override.yml auto-load)
#            docker compose -f docker-compose.yml -f docker-compose.ci.yml (CI)

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Migrations (one-shot) ──────────────────────────────────────────────────

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Application services ───────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      OFFLINE: ${OFFLINE:-0}
    volumes:
      - openapi:/openapi
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  types-codegen:
    build:
      context: .
      dockerfile: packages/types/Dockerfile
      target: production
    volumes:
      - openapi:/openapi
    depends_on:
      - api
    restart: "no"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: production
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SQLX_OFFLINE: "true"
      PROPTEST_CASES: ${PROPTEST_CASES:-64}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000}
    depends_on:
      api:
        condition: service_healthy
      types-codegen:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  openapi:
  cargo-cache:
  bun-cache:
  uv-cache:
